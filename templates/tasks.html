<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasks</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card tasks-card">
        <header class="card__header tasks-head">
          <div>
            <p class="eyebrow">Task Board</p>
            <h1 id="hello-text">Tasklar</h1>
            <p class="subtitle">Holatlar: ochiq, bajarilmoqda, bajarib bo'ldi</p>
          </div>
          <button id="logout-btn" class="ghost-btn" type="button">Chiqish</button>
        </header>

        <form id="task-form" class="todo-form">
          <input
            id="task-input"
            type="text"
            maxlength="200"
            placeholder="Masalan: API test yozish"
            required
          />
          <button type="submit">Qo'shish</button>
        </form>

        <section class="status-grid">
          <article>
            <h3>Ochiq</h3>
            <ul id="list-open" class="todo-list"></ul>
          </article>
          <article>
            <h3>Bajarilmoqda</h3>
            <ul id="list-in-progress" class="todo-list"></ul>
          </article>
          <article>
            <h3>Bajarib bo'ldi</h3>
            <ul id="list-done" class="todo-list"></ul>
          </article>
        </section>
      </section>
    </main>
    <script src="/static/auth.js"></script>
    <script src="/static/tasks.js"></script>
  </body>
</html>
